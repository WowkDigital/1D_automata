<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automata. | 1D Cellular Automata</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                            950: '#042f2e',
                        },
                        surface: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',
                            900: '#171717',
                            950: '#0a0a0a',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Glassmorphism effects */
        .glass-panel {
            background: rgba(23, 23, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(20, 184, 166, 0.2);
        }

        /* Input styling */
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #14b8a6;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(20, 184, 166, 0.4);
            border: 2px solid white;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Background Overlay */
        .bg-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Button Hover Glow */
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.3);
        }
    </style>
</head>

<body class="bg-surface-950 text-surface-200 font-sans h-screen w-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Main Workspace -->
    <main class="flex-1 relative flex items-center justify-center p-4 md:p-12 overflow-hidden z-0" id="canvasContainer">

            </div>

            <div id="statsDisplay">GEN: 0</div>

        <!-- Canvas Container with Glow -->

            <canvas id="caCanvas"

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Core Application Logic (Preserved and slightly updated for UI elements) ---
        class CellularAutomata {
            constructor() {
                // DOM Elements
                this.canvas = document.getElementById('caCanvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.container = document.getElementById('canvasContainer');

                this.ruleInput = document.getElementById('ruleInput');
                this.presetRules = document.getElementById('presetRules');
                this.ruleDisplay = document.getElementById('ruleDisplay');
                this.statsDisplay = document.getElementById('statsDisplay');

                this.btnPlay = document.getElementById('btnPlay');
                this.btnStep = document.getElementById('btnStep');
                this.btnReset = document.getElementById('btnReset');

                this.speedSlider = document.getElementById('speedSlider');
                this.speedDisplay = document.getElementById('speedDisplay');
                this.sizeSlider = document.getElementById('sizeSlider');
                this.sizeDisplay = document.getElementById('sizeDisplay');

                this.initCenterBtn = document.getElementById('initCenter');
                this.initRandomBtn = document.getElementById('initRandom');

                this.colorAliveInput = document.getElementById('colorAlive');
                this.colorDeadInput = document.getElementById('colorDead');

                this.ruleVisualizer = document.getElementById('ruleVisualizer');
                this.btnRandomRule = document.getElementById('btnRandomRule');
                this.resetOnChangeToggle = document.getElementById('resetOnChange');

                // State
                this.rule = 30;
                this.ruleTable = new Uint8Array(8);
                this.cellSize = parseInt(this.sizeSlider.value);
                this.speed = parseInt(this.speedSlider.value);
                this.resetOnRuleChange = false;
                this.cols = 0;
                this.rows = 0;
                this.grid = []; 
                this.gridPointer = 0;
                this.totalGenerations = 0;
                this.isRunning = false;
                this.initialMode = 'center';

                this.colorAlive = this.colorAliveInput.value;
                this.colorDead = this.colorDeadInput.value;

                this.lastFrameTime = 0;
                this.frameAccumulator = 0;
                this.animationReq = null;

                // Initialization
                this.bindEvents();
                this.setRule(this.rule);
                this.resizeAndReset();
            }

            bindEvents() {
                this.ruleInput.addEventListener('input', (e) => {
                    let val = parseInt(e.target.value);
                    if (isNaN(val)) return;
                    val = Math.max(0, Math.min(255, val));
                    this.setRule(val);
                });

                this.presetRules.addEventListener('change', (e) => {
                    if (e.target.value) {
                        const val = parseInt(e.target.value);
                        this.setRule(val);
                        this.ruleInput.value = val;
                    }
                });

                this.btnRandomRule.addEventListener('click', () => {
                    const randomRule = Math.floor(Math.random() * 256);
                    this.ruleInput.value = randomRule;
                    this.setRule(randomRule);
                });

                this.resetOnChangeToggle.addEventListener('change', (e) => {
                    this.resetOnRuleChange = e.target.checked;
                });

                this.btnPlay.addEventListener('click', () => this.togglePlay());
                this.btnStep.addEventListener('click', () => {
                    this.pause();
                    this.generateNextRow();
                    this.draw();
                });
                this.btnReset.addEventListener('click', () => {
                    this.pause();
                    this.resizeAndReset();
                });

                this.speedSlider.addEventListener('input', (e) => {
                    this.speed = parseInt(e.target.value);
                    this.speedDisplay.textContent = this.speed === 60 ? 'Max' : `${this.speed} fps`;
                });

                this.sizeSlider.addEventListener('change', (e) => {
                    this.cellSize = parseInt(e.target.value);
                    this.sizeDisplay.textContent = `${this.cellSize}px`;
                    this.pause();
                    this.resizeAndReset();
                });

                this.colorAliveInput.addEventListener('input', (e) => {
                    this.colorAlive = e.target.value;
                    this.updateRuleVisualizer();
                    this.draw();
                });

                this.colorDeadInput.addEventListener('input', (e) => {
                    this.colorDead = e.target.value;
                    this.updateRuleVisualizer();
                    this.draw();
                });

                this.initCenterBtn.addEventListener('click', () => {
                    this.initialMode = 'center';
                    this.initCenterBtn.className = "flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all duration-200 bg-white/10 text-white shadow-sm";
                    this.initRandomBtn.className = "flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all duration-200 text-surface-500 hover:text-white";
                    this.pause();
                    this.resizeAndReset();
                });

                this.initRandomBtn.addEventListener('click', () => {
                    this.initialMode = 'random';
                    this.initRandomBtn.className = "flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all duration-200 bg-white/10 text-white shadow-sm";
                    this.initCenterBtn.className = "flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all duration-200 text-surface-500 hover:text-white";
                    this.pause();
                    this.resizeAndReset();
                });

                window.addEventListener('resize', () => {
                    clearTimeout(this.resizeTimeout);
                    this.resizeTimeout = setTimeout(() => {
                        this.pause();
                        this.resizeAndReset();
                    }, 200);
                });
            }

            setRule(ruleNumber) {
                this.rule = ruleNumber;
                this.ruleDisplay.textContent = `Rule ${this.rule}`;
                for (let i = 0; i < 8; i++) {
                    this.ruleTable[i] = (this.rule >> i) & 1;
                }
                this.updateRuleVisualizer();

                if (this.resetOnRuleChange) {
                    this.pause();
                    this.resizeAndReset();
                }
            }

            updateRuleVisualizer() {
                this.ruleVisualizer.innerHTML = '';
                for (let i = 7; i >= 0; i--) {
                    const left = (i >> 2) & 1;
                    const center = (i >> 1) & 1;
                    const right = i & 1;
                    const result = (this.rule >> i) & 1;

                    const col = document.createElement('div');
                    col.className = 'flex flex-col items-center gap-1.5 flex-1 max-w-[28px]';

                    const topRow = document.createElement('div');
                    topRow.className = 'flex gap-[1px]';

                    [left, center, right].forEach(val => {
                        const cell = document.createElement('div');
                        cell.className = 'w-1.5 h-1.5 rounded-[1px]';
                        cell.style.backgroundColor = val ? this.colorAlive : 'transparent';
                        cell.style.border = val ? 'none' : '1px solid rgba(255,255,255,0.1)';
                        topRow.appendChild(cell);
                    });

                    const resCell = document.createElement('div');
                    resCell.className = 'w-1.5 h-1.5 rounded-[1px] mt-0.5';
                    resCell.style.backgroundColor = result ? this.colorAlive : 'transparent';
                    resCell.style.border = result ? 'none' : '1px solid rgba(255,255,255,0.1)';

                    col.appendChild(topRow);
                    col.appendChild(resCell);
                    this.ruleVisualizer.appendChild(col);
                }
            }

            resizeAndReset() {
                const rect = this.container.getBoundingClientRect();
                const padding = window.innerWidth < 768 ? 32 : 96;

                let canvasW = rect.width - padding;
                let canvasH = rect.height - padding;

                this.cols = Math.floor(canvasW / this.cellSize);
                this.rows = Math.floor(canvasH / this.cellSize);

                this.canvas.width = this.cols * this.cellSize;
                this.canvas.height = this.rows * this.cellSize;

                this.resetGrid();
                this.draw();
            }

            resetGrid() {
                this.grid = Array.from({ length: this.rows }, () => new Uint8Array(this.cols));
                this.gridPointer = 0;
                this.totalGenerations = 0;

                const firstRow = this.grid[0];
                if (this.initialMode === 'center') {
                    firstRow[Math.floor(this.cols / 2)] = 1;
                } else {
                    for (let i = 0; i < this.cols; i++) {
                        firstRow[i] = Math.random() > 0.5 ? 1 : 0;
                    }
                }
                this.totalGenerations = 1;
                this.updateStats();
            }

            updateStats() {
                this.statsDisplay.textContent = `GEN: ${this.totalGenerations}`;
            }

            generateNextRow() {
                const prevRow = this.grid[this.gridPointer];
                this.gridPointer = (this.gridPointer + 1) % this.rows;
                const nextRow = this.grid[this.gridPointer];

                const cols = this.cols;
                const ruleTable = this.ruleTable;

                let left = prevRow[cols - 1];
                let center = prevRow[0];
                let right = prevRow[1];
                nextRow[0] = ruleTable[(left << 2) | (center << 1) | right];

                for (let i = 1; i < cols - 1; i++) {
                    left = center;
                    center = right;
                    right = prevRow[i + 1];
                    nextRow[i] = ruleTable[(left << 2) | (center << 1) | right];
                }

                left = center;
                center = right;
                right = prevRow[0];
                nextRow[cols - 1] = ruleTable[(left << 2) | (center << 1) | right];

                this.totalGenerations++;
                this.updateStats();
            }

            drawRow(row, y) {
                const cellSize = this.cellSize;
                const cols = this.cols;
                this.ctx.fillStyle = this.colorAlive;
                this.ctx.beginPath();
                
                let xStart = -1;
                for (let x = 0; x < cols; x++) {
                    if (row[x] === 1) {
                        if (xStart === -1) xStart = x;
                    } else if (xStart !== -1) {
                        this.ctx.rect(xStart * cellSize, y * cellSize, (x - xStart) * cellSize, cellSize);
                        xStart = -1;
                    }
                }
                if (xStart !== -1) {
                    this.ctx.rect(xStart * cellSize, y * cellSize, (cols - xStart) * cellSize, cellSize);
                }
                this.ctx.fill();
            }

            draw() {
                this.ctx.fillStyle = this.colorDead;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const currentHistoryCount = Math.min(this.totalGenerations, this.rows);
                const startPointer = (this.gridPointer - currentHistoryCount + 1 + this.rows) % this.rows;

                for (let i = 0; i < currentHistoryCount; i++) {
                    const idx = (startPointer + i) % this.rows;
                    this.drawRow(this.grid[idx], i);
                }
            }

            togglePlay() {
                if (this.isRunning) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                this.isRunning = true;
                this.btnPlay.innerHTML = '<i data-lucide="pause" class="w-4 h-4 fill-current"></i> <span>Pause</span>';
                this.btnPlay.classList.replace('bg-brand-500', 'bg-amber-500');
                this.btnPlay.classList.replace('hover:bg-brand-400', 'hover:bg-amber-400');
                lucide.createIcons();
                this.lastFrameTime = performance.now();
                this.animationReq = requestAnimationFrame((t) => this.loop(t));
            }

            pause() {
                this.isRunning = false;
                this.btnPlay.innerHTML = '<i data-lucide="play" class="w-4 h-4 fill-current"></i> <span>Play</span>';
                this.btnPlay.classList.replace('bg-amber-500', 'bg-brand-500');
                this.btnPlay.classList.replace('hover:bg-amber-400', 'hover:bg-brand-400');
                lucide.createIcons();
                if (this.animationReq) cancelAnimationFrame(this.animationReq);
            }

            loop(timestamp) {
                if (!this.isRunning) return;

                const deltaTime = timestamp - this.lastFrameTime;
                this.lastFrameTime = timestamp;

                const timePerFrame = 1000 / this.speed;
                this.frameAccumulator += deltaTime;

                let iterations = 0;
                while (this.frameAccumulator >= timePerFrame && iterations < 10) {
                    this.generateNextRow();
                    const nextRow = this.grid[this.gridPointer];
                    const cellSize = this.cellSize;
                    
                    if (this.totalGenerations <= this.rows) {
                        this.drawRow(nextRow, this.totalGenerations - 1);
                    } else {
                        this.ctx.drawImage(this.canvas, 0, cellSize, this.canvas.width, this.canvas.height - cellSize, 0, 0, this.canvas.width, this.canvas.height - cellSize);
                        this.ctx.fillStyle = this.colorDead;
                        this.ctx.fillRect(0, this.canvas.height - cellSize, this.canvas.width, cellSize);
                        this.drawRow(nextRow, this.rows - 1);
                    }
                    this.frameAccumulator -= timePerFrame;
                    iterations++;
                }

                if (this.isRunning) {
                    this.animationReq = requestAnimationFrame((t) => this.loop(t));
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.caApp = new CellularAutomata();
        });
    </script>
</body>
